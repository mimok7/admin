name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 18 * * *' # UTC 18:00 = KST 03:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set timestamp
        run: echo "TS=$(date +%F_%H%M%S)" >> $GITHUB_ENV

      - name: Install PostgreSQL 17 client and gzip
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release gzip
          # PostgreSQL APT 저장소 추가 (PG 17 클라이언트용 - Supabase 호환)
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is missing"
            echo "Supabase Dashboard > Project Settings > Database > Connection string > URI"
            echo "반드시 Pooler(Session mode) URL을 사용하세요:"
            echo "  postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres"
            exit 1
          fi

          # GitHub Actions 에서는 Supabase 직접 연결(db.xxx:5432)이 차단될 수 있음.
          # SUPABASE_DB_URL 은 반드시 Session-mode pooler URL 을 사용해야 함:
          # postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres

          FILE="supabase_backup_${TS}.dump"
          /usr/lib/postgresql/17/bin/pg_dump \
            --no-owner \
            --no-privileges \
            --format=custom \
            --lock-wait-timeout=30000 \
            --dbname "$SUPABASE_DB_URL" \
            --file "$FILE"
          gzip -f "$FILE"
          echo "BACKUP_FILE=${FILE}.gz" >> $GITHUB_ENV

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.TS }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Check rclone config
        id: rclone_check
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
          RCLONE_REMOTE_PATH: ${{ secrets.RCLONE_REMOTE_PATH }}
        run: |
          if [ -n "$RCLONE_CONFIG_BASE64" ] && [ -n "$RCLONE_REMOTE_PATH" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "rclone secrets not set, skipping cloud upload"
          fi

      - name: Configure rclone (optional)
        if: steps.rclone_check.outputs.enabled == 'true'
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload to cloud drive via rclone (optional)
        if: steps.rclone_check.outputs.enabled == 'true'
        env:
          RCLONE_REMOTE_PATH: ${{ secrets.RCLONE_REMOTE_PATH }}
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone copy "${BACKUP_FILE}" "${RCLONE_REMOTE_PATH}" --create-empty-src-dirs
          rclone lsf "${RCLONE_REMOTE_PATH}" | tail -n 20
