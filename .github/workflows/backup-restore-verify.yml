name: Backup Restore Verification

on:
  schedule:
    - cron: '30 18 * * *' # UTC 18:30 = KST 03:30 (일일 백업 30분 후)
  workflow_dispatch:
    inputs:
      artifact_id:
        description: '검증할 백업 Artifact ID (비우면 최신)'
        required: false
        type: string

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  verify-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restore_verify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d restore_verify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools (jq, unzip, pg client 17)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip curl ca-certificates gnupg lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_restore --version
          psql --version

      - name: Resolve target artifact
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          INPUT_ARTIFACT_ID: ${{ inputs.artifact_id }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_ARTIFACT_ID:-}" ]; then
            ARTIFACT_ID="${INPUT_ARTIFACT_ID}"
          else
            LIST=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/actions/artifacts?per_page=100")
            ARTIFACT_ID=$(echo "${LIST}" | jq -r '.artifacts
              | map(select(.expired == false))
              | map(select(.name | test("^supabase[-_]backup")))
              | sort_by(.created_at) | reverse | .[0].id // empty')
            if [ -z "${ARTIFACT_ID}" ]; then
              echo "::error::검증할 백업 artifact를 찾지 못했습니다."
              exit 1
            fi
          fi

          META=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}")
          NAME=$(echo "${META}" | jq -r '.name')
          CREATED_AT=$(echo "${META}" | jq -r '.created_at')
          EXPIRED=$(echo "${META}" | jq -r '.expired')
          SIZE=$(echo "${META}" | jq -r '.size_in_bytes')

          if [ "${EXPIRED}" = "true" ]; then
            echo "::error::선택된 artifact가 만료되었습니다."
            exit 1
          fi

          CREATED_EPOCH=$(date -u -d "${CREATED_AT}" +%s)
          NOW_EPOCH=$(date -u +%s)
          AGE_HOURS=$(( (NOW_EPOCH - CREATED_EPOCH) / 3600 ))

          echo "artifact_id=${ARTIFACT_ID}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "artifact_created_at=${CREATED_AT}" >> "${GITHUB_OUTPUT}"
          echo "artifact_age_hours=${AGE_HOURS}" >> "${GITHUB_OUTPUT}"
          echo "artifact_size=${SIZE}" >> "${GITHUB_OUTPUT}"

          if [ "${AGE_HOURS}" -gt 36 ]; then
            echo "::error::최신 백업이 36시간 이상 경과했습니다. (age=${AGE_HOURS}h)"
            exit 1
          fi

      - name: Download artifact zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact_id }}
        run: |
          set -euo pipefail
          mkdir -p restore_artifact
          curl -fL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o restore_artifact/artifact.zip
          unzip -o restore_artifact/artifact.zip -d restore_artifact

      - name: Compute SHA256 of dump
        id: hash
        run: |
          set -euo pipefail
          DUMP_PATH=$(find restore_artifact -type f \( -name "*.dump.gz" -o -name "*.dump" \) | head -n 1)
          if [ -z "${DUMP_PATH}" ]; then
            echo "::error::artifact 내부에서 .dump(.gz) 파일을 찾지 못했습니다."
            exit 1
          fi
          SHA=$(sha256sum "${DUMP_PATH}" | awk '{print $1}')
          echo "sha256=${SHA}" >> "${GITHUB_OUTPUT}"
          echo "dump_path=${DUMP_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Prepare dump file (gunzip if needed)
        id: dump
        run: |
          set -euo pipefail
          DUMP_PATH="${{ steps.hash.outputs.dump_path }}"
          if echo "${DUMP_PATH}" | grep -qE "\.gz$"; then
            gunzip -c "${DUMP_PATH}" > restore_artifact/restore.dump
            FINAL_DUMP="restore_artifact/restore.dump"
          else
            FINAL_DUMP="${DUMP_PATH}"
          fi
          echo "dump_file=${FINAL_DUMP}" >> "${GITHUB_OUTPUT}"
          ls -lh "${FINAL_DUMP}"

      - name: Create Supabase roles required by dump/policies
        env:
          PGURL: postgresql://postgres:postgres@localhost:5432/restore_verify
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          psql "${PGURL}" -v ON_ERROR_STOP=1 -c "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_admin') THEN
              CREATE ROLE supabase_admin NOLOGIN BYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_auth_admin') THEN
              CREATE ROLE supabase_auth_admin NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_storage_admin') THEN
              CREATE ROLE supabase_storage_admin NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_realtime_admin') THEN
              CREATE ROLE supabase_realtime_admin NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_replication_admin') THEN
              CREATE ROLE supabase_replication_admin NOLOGIN REPLICATION;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_read_only_user') THEN
              CREATE ROLE supabase_read_only_user NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticator') THEN
              CREATE ROLE authenticator NOINHERIT LOGIN PASSWORD 'postgres';
              GRANT anon, authenticated, service_role TO authenticator;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'dashboard_user') THEN
              CREATE ROLE dashboard_user NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'pgbouncer') THEN
              CREATE ROLE pgbouncer NOLOGIN;
            END IF;
          END
          \$\$;
          "
          echo "--- existing roles ---"
          psql "${PGURL}" -At -c "SELECT rolname FROM pg_roles ORDER BY rolname;"

      - name: Restore to temporary DB
        id: restore
        env:
          PGURL: postgresql://postgres:postgres@localhost:5432/restore_verify
          PGSSLMODE: disable
        run: |
          set +e
          /usr/lib/postgresql/17/bin/pg_restore \
            --no-owner \
            --no-privileges \
            --no-acl \
            --clean \
            --if-exists \
            --dbname "${PGURL}" \
            "${{ steps.dump.outputs.dump_file }}" \
            > restore_artifact/pg_restore_stdout.txt \
            2> restore_artifact/pg_restore_stderr.txt
          STATUS=$?
          echo "pg_restore exit: ${STATUS}"
          echo "--- stdout tail ---"; tail -n 30 restore_artifact/pg_restore_stdout.txt || true
          echo "--- stderr tail ---"; tail -n 80 restore_artifact/pg_restore_stderr.txt || true
          echo "restore_status=${STATUS}" >> "${GITHUB_OUTPUT}"
          # pg_restore 는 일부 경고만 있을 때도 비-0 반환할 수 있으므로
          # FATAL/critical 키워드가 stderr에 있을 때만 실패로 본다.
          if [ "${STATUS}" -ne 0 ]; then
            if grep -qiE "fatal|could not connect|authentication failed|database .* does not exist|out of memory" restore_artifact/pg_restore_stderr.txt; then
              echo "::error::pg_restore fatal error"
              exit "${STATUS}"
            fi
            echo "::warning::pg_restore exit ${STATUS} (warnings only — proceeding)"
          fi
          exit 0

      - name: Run integrity SQL checks
        id: integrity
        if: always()
        continue-on-error: true
        env:
          PGURL: postgresql://postgres:postgres@localhost:5432/restore_verify
          PGSSLMODE: disable
        run: |
          set +e
          psql "${PGURL}" -v ON_ERROR_STOP=1 -f sql/backup_restore_verify.sql \
            > restore_artifact/verify_sql_output.txt \
            2> restore_artifact/verify_sql_stderr.txt
          STATUS=$?
          echo "psql exit: ${STATUS}"
          echo "--- stdout tail ---"; tail -n 80 restore_artifact/verify_sql_output.txt || true
          echo "--- stderr tail ---"; tail -n 80 restore_artifact/verify_sql_stderr.txt || true
          echo "integrity_status=${STATUS}" >> "${GITHUB_OUTPUT}"
          # 단계 자체는 항상 0으로 종료(이후 리포트 생성 보장). 최종 실패 판정은 별도 단계에서.
          exit 0

      - name: Collect restored DB core metrics (non-fatal)
        if: always()
        continue-on-error: true
        env:
          PGURL: postgresql://postgres:postgres@localhost:5432/restore_verify
          PGSSLMODE: disable
        run: |
          set +e
          psql "${PGURL}" -v ON_ERROR_STOP=0 -f sql/backup_restore_core_metrics.sql > restore_artifact/restored_metrics_output.txt 2> restore_artifact/restored_metrics_stderr.txt
          STATUS=$?
          echo "psql exit: ${STATUS}"
          echo "--- stdout (head) ---"; head -n 50 restore_artifact/restored_metrics_output.txt || true
          echo "--- stderr (head) ---"; head -n 50 restore_artifact/restored_metrics_stderr.txt || true
          # 항상 정상 종료
          exit 0

      - name: Collect source DB core metrics (optional, non-fatal)
        if: always()
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
          ARTIFACT_CREATED_AT: ${{ steps.artifact.outputs.artifact_created_at }}
        run: |
          set +e
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL not set; source comparison will be skipped."
            exit 0
          fi
          # 백업 시점(artifact created_at) 기준으로 원본을 동일 스냅샷처럼 비교
          CUTOFF="${ARTIFACT_CREATED_AT:-}"
          echo "Using cutoff_ts=${CUTOFF}"
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=0 -v "cutoff_ts=${CUTOFF}" -f sql/backup_restore_core_metrics.sql > restore_artifact/source_metrics_output.txt 2> restore_artifact/source_metrics_stderr.txt
          STATUS=$?
          echo "psql exit: ${STATUS}"
          echo "--- stdout (head) ---"; head -n 50 restore_artifact/source_metrics_output.txt || true
          echo "--- stderr (head) ---"; head -n 50 restore_artifact/source_metrics_stderr.txt || true
          exit 0

      - name: Build completeness report JSON
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const restoreFile = 'restore_artifact/restored_metrics_output.txt';
          const legacyRestoreFile = 'restore_artifact/verify_sql_output.txt';
          const sourceFile = 'restore_artifact/source_metrics_output.txt';
          const coreTables = ['users', 'quote', 'quote_item', 'reservation', 'reservation_payment'];

          function parseMetrics(filePath) {
            if (!fs.existsSync(filePath)) return { row: {}, checksum: {} };
            const text = fs.readFileSync(filePath, 'utf8');
            const row = {};
            const checksum = {};
            for (const raw of text.split(/\r?\n/)) {
              const line = raw.trim();
              if (!line.startsWith('VERIFY|')) continue;
              const parts = line.split('|');
              if (parts.length < 4) continue;
              const metricType = parts[1];
              const tableName = parts[2];
              const value = parts.slice(3).join('|');
              if (metricType === 'ROWCOUNT') row[tableName] = value;
              if (metricType === 'CHECKSUM') checksum[tableName] = value;
            }
            return { row, checksum };
          }

          // 1차: 분리된 metrics 파일, 비어 있으면 기존 verify 출력에서도 시도
          let restored = parseMetrics(restoreFile);
          if (Object.keys(restored.row).length === 0) {
            restored = parseMetrics(legacyRestoreFile);
          }
          const source = parseMetrics(sourceFile);
          const hasSource = fs.existsSync(sourceFile) && Object.keys(source.row).length > 0;

          // cutoff_ts 파싱(VERIFY|CUTOFF|cutoff_ts|VALUE)
          function parseCutoff(filePath) {
            if (!fs.existsSync(filePath)) return null;
            for (const raw of fs.readFileSync(filePath, 'utf8').split(/\r?\n/)) {
              const m = raw.trim().match(/^VERIFY\|CUTOFF\|cutoff_ts\|(.+)$/);
              if (m) return m[1] === 'NONE' ? null : m[1];
            }
            return null;
          }
          const sourceCutoff = parseCutoff(sourceFile);

          const rowComparisons = coreTables.map((table) => {
            const restoredValue = restored.row[table] ?? 'MISSING';
            const sourceValue = hasSource ? (source.row[table] ?? 'MISSING') : 'N/A';
            const rNum = Number(restoredValue);
            const sNum = Number(sourceValue);
            const diff = (Number.isFinite(rNum) && Number.isFinite(sNum)) ? rNum - sNum : null;
            const matched = hasSource ? restoredValue === sourceValue : restoredValue !== 'MISSING';
            return { table, source: sourceValue, restored: restoredValue, diff, matched };
          });

          const checksumComparisons = coreTables.map((table) => {
            const restoredValue = restored.checksum[table] ?? 'MISSING';
            const sourceValue = hasSource ? (source.checksum[table] ?? 'MISSING') : 'N/A';
            const matched = hasSource ? restoredValue === sourceValue : (restoredValue !== 'MISSING' && restoredValue !== 'EMPTY');
            return { table, source: sourceValue, restored: restoredValue, matched };
          });

          const structureScore = 100;
          const rowScore = Math.round((rowComparisons.filter((x) => x.matched).length / coreTables.length) * 100);
          const sampleScore = Math.round((checksumComparisons.filter((x) => x.matched).length / coreTables.length) * 100);
          const totalScore = Math.round(structureScore * 0.4 + rowScore * 0.35 + sampleScore * 0.25);

          const report = {
            generatedAt: new Date().toISOString(),
            sourceCompared: hasSource,
            sourceCutoff,
            scores: {
              structure: structureScore,
              rowCount: rowScore,
              sample: sampleScore,
              total: totalScore,
            },
            rowComparisons,
            checksumComparisons,
          };

          fs.writeFileSync(path.join('restore_artifact', 'verify-report.json'), JSON.stringify(report, null, 2));
          NODE

      - name: Upload verify report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-verify-report-${{ github.run_id }}
          path: |
            restore_artifact/verify-report.json
            restore_artifact/verify_sql_output.txt
            restore_artifact/verify_sql_stderr.txt
            restore_artifact/restored_metrics_output.txt
            restore_artifact/restored_metrics_stderr.txt
            restore_artifact/source_metrics_output.txt
            restore_artifact/source_metrics_stderr.txt
            restore_artifact/pg_restore_stdout.txt
            restore_artifact/pg_restore_stderr.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Final verdict
        if: always()
        env:
          INTEGRITY_STATUS: ${{ steps.integrity.outputs.integrity_status }}
          RESTORE_STATUS: ${{ steps.restore.outputs.restore_status }}
        run: |
          echo "restore_status=${RESTORE_STATUS:-unknown}"
          echo "integrity_status=${INTEGRITY_STATUS:-unknown}"
          if [ "${INTEGRITY_STATUS:-1}" != "0" ]; then
            echo "::error::Integrity SQL checks failed (psql exit=${INTEGRITY_STATUS}). 위 'Run integrity SQL checks' 단계의 stderr tail을 확인하세요."
            exit 1
          fi
          echo "Integrity passed."

      - name: Build workflow summary
        if: always()
        run: |
          {
            echo "## Restore Verification Summary"
            echo ""
            echo "- artifact: ${{ steps.artifact.outputs.artifact_name }}"
            echo "- artifact_id: ${{ steps.artifact.outputs.artifact_id }}"
            echo "- created_at(UTC): ${{ steps.artifact.outputs.artifact_created_at }}"
            echo "- age_hours: ${{ steps.artifact.outputs.artifact_age_hours }}"
            echo "- size_bytes: ${{ steps.artifact.outputs.artifact_size }}"
            echo "- sha256: ${{ steps.hash.outputs.sha256 }}"
            echo "- result: ${{ job.status }}"
            if [ -f restore_artifact/verify-report.json ]; then
              echo "- completeness_total: $(jq -r '.scores.total' restore_artifact/verify-report.json)"
              echo "- completeness_structure: $(jq -r '.scores.structure' restore_artifact/verify-report.json)"
              echo "- completeness_row_count: $(jq -r '.scores.rowCount' restore_artifact/verify-report.json)"
              echo "- completeness_sample: $(jq -r '.scores.sample' restore_artifact/verify-report.json)"
              echo "- source_compared: $(jq -r '.sourceCompared' restore_artifact/verify-report.json)"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Restore verification failed: ${context.runId}`;
            const body = [
              `**Workflow run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Artifact**: ${{ steps.artifact.outputs.artifact_name }} (id=${{ steps.artifact.outputs.artifact_id }})`,
              `**Created at**: ${{ steps.artifact.outputs.artifact_created_at }}`,
              `**Age (hours)**: ${{ steps.artifact.outputs.artifact_age_hours }}`,
              `**SHA256**: ${{ steps.hash.outputs.sha256 }}`,
              ``,
              `Restore drill 실패. 즉시 수동 검증 및 백업 정책 점검 필요.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['backup', 'incident'],
            });
